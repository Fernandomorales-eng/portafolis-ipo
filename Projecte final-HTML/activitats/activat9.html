<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Pràctica de Formularis </h1>


    <h2>Exercici 1: Crear un formulari bàsic de contacte</h2>
    
    <form>
        <p>
            <label for="nom_basic">Nom:</label>
            <input type="text" id="nom_basic" name="nom_basic">
        </p>

        <p>
            <label for="email_basic">Correu electrònic:</label>
            <input type="email" id="email_basic" name="email_basic">
        </p>

        <p>
            <label for="missatge_basic">Missatge:</label><br>
            <textarea id="missatge_basic" name="missatge_basic" rows="4" cols="40"></textarea>
        </p>

        <p>
            <button type="submit">Enviar</button>
        </p>
    </form>



    <h2>Exercici 2: Formularis amb validació bàsica de camps</h2>
    
    <form>
        <p>
            <label for="nom_valida">Nom:</label>
            <input type="text" id="nom_valida" name="nom_valida">
        </p>

        <p>
            <label for="email_valida">Correu electrònic (Obligatori):</label>
            <input type="email" id="email_valida" name="email_valida" required>
        </p>

        <p>
            <label for="missatge_valida">Missatge (Mínim 67 caràcters):</label><br>
            <textarea id="missatge_valida" name="missatge_valida" rows="4" cols="40" minlength="67"></textarea>
        </p>

        <p>
            <button type="submit">Enviar formulari</button>
        </p>
    </form>



    <h2>Exercici 3: Formulari amb diferents tipus de camps</h2>
    
    <form>
        <p>
            <label for="nom_varis">Nom:</label>
            <input type="text" id="nom_varis" name="nom_varis">
        </p>

        <p>
            <label for="data_naixement">Data de naixement:</label>
            <input type="date" id="data_naixement" name="data_naixement">
        </p>

        <p>
            <label>Gènere:</label><br>
            <input type="radio" id="gen_masculi" name="genere" value="masculi">
            <label for="gen_masculi">home</label><br>
            
            <input type="radio" id="gen_femeni" name="genere" value="femeni">
            <label for="gen_femeni">dona</label><br>
            
            <input type="radio" id="gen_altre" name="genere" value="altre">
            <label for="gen_altre">no identificat</label>
        </p>

        <p>
            <label>Aficions:</label><br>
            <input type="checkbox" id="aficio_musica" name="aficions" value="musica">
            <label for="aficio_musica">jugar videojocs</label><br>
            
            <input type="checkbox" id="aficio_esport" name="aficions" value="esport">
            <label for="aficio_esport">Esport</label><br>
            
            <input type="checkbox" id="aficio_lectura" name="aficions" value="lectura">
            <label for="aficio_lectura">menjar</label><br>
            
            <input type="checkbox" id="aficio_viatjar" name="aficions" value="viatjar">
            <label for="aficio_viatjar">Viatjar</label>
        </p>

        <p>
            <label for="comentaris">Comentaris (Màxim 67 caràcters):</label><br>
            <textarea id="comentaris" name="comentaris" rows="4" cols="40" maxlength="67"></textarea>
        </p>

        
        <p></p><button type="submit">Enviar dades</button></p>
        
    </form>


   
    <h2>Exercici 4: Formulari de registre amb diversos camps</h2>
    
    <form>
        <p>
            <label for="nom_complet">Nom complet:</label>
            <input type="text" id="nom_complet" name="nom_complet" required>
        </p>

        <p>
            <label for="email_registre">Correu electrònic:</label>
            <input type="email" id="email_registre" name="email_registre" required>
        </p>

        <p>
            <label for="contrasenya">Contrasenya:</label>
            <input type="password" id="contrasenya" name="contrasenya" required>
        </p>

        <p>
            <label for="confirma_contrasenya">Confirma la contrasenya:</label>
            <input type="password" id="confirma_contrasenya" name="confirma_contrasenya" required>
        </p>

        <p>
            <input type="checkbox" id="termes" name="termes" required>
            <label for="termes">Accepto els termes i condicions .</label>
        </p>

        <p> <button type="submit">Registrar-se</button></p>
        </p>
    </form>


</body>
</html>
